<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: black;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: rgba(0,0,0,0.7);
      position: fixed;
      width: 100%;
    }

    .logo {
      color: red;
      font-size: 24px;
      font-weight: bold;
    }

    .banner {
      height: 80vh;
      background: url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4") center/cover;
      display: flex;
      align-items: center;
      padding: 40px;
    }

    .banner h1 {
      font-size: 50px;
    }

    .row {
      margin: 20px;
    }

    .row h2 {
      margin-bottom: 10px;
    }

    .movies {
      display: flex;
      overflow-x: scroll;
    }

    .movies img {
      width: 200px;
      margin-right: 10px;
      transition: transform 0.3s;
    }

    .movies img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<header>
  <div class="logo">NETFLIX</div>
</header>

<div class="banner">
  <h1>Welcome to Netflix</h1>
</div>

<div class="row">
  <h2>Trending Now</h2>
  <div class="movies">
    <img src="https://via.placeholder.com/200x300">
    <img src="https://via.placeholder.com/200x300">
    <img src="https://via.placeholder.com/200x300">
    <img src="https://via.placeholder.com/200x300">
  </div>
</div>

<div class="row">
  <h2>Top Rated</h2>
  <div class="movies">
    <img src="https://via.placeholder.com/200x300">
    <img src="https://via.placeholder.com/200x300">
    <img src="https://via.placeholder.com/200x300">
  </div>
</div>

</body>
</html>
